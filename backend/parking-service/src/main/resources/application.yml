server:
  port: 8080

spring:
  application:
    name: parking-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:parking_spaces}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI}

stripe:
  api-key: ${STRIPE_SECRET_KEY:sk_test_mock}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_mock}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/search?success=true}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/search?cancelled=true}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
